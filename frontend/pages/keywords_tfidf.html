<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基于TF IDF的消费者核心偏好特征挖掘</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
    <script src="../static/progress.js"></script>
</head>
<body style="background: transparent; overflow-y: auto; display: block; height: auto;">
    <div class="page-container">
        <h2 class="page-title">基于TF IDF的消费者核心偏好特征挖掘</h2>
        <div id="loading" class="loading">
            <div class="loading-label">正在加载并进行分析，请稍候...</div>
            <div class="progress-text">0%/100%</div>
            <div class="progress-bar-wrap"><div class="progress-bar-inner"></div></div>
        </div>
        <div id="error" class="error-msg" style="display:none;"></div>

        <div class="grid-2" id="content" style="display:none;">

            <div class="card" style="grid-column: span 2; display: flex; justify-content: center;">
                <div style="width: 50%;">
                    <h3>偏好雷达图</h3>
                    <div id="chart-radar" class="chart-container"></div>
                </div>
            </div>

    <script>
        var pg = createProgress('loading');
        sseRequest('/api/keywords', pg, function(data) {
            var radarData = data.radar;
            document.getElementById('content').style.display = 'grid';
            var chartRadar = echarts.init(document.getElementById('chart-radar'));
            chartRadar.setOption({
                tooltip: {},
                radar: { indicator: radarData.map(function(item) { return { name: item.name, max: item.max }; }) },
                series: [{ type: 'radar', data: [{ value: radarData.map(function(item) { return item.value; }), name: '核心偏好特征', areaStyle: { color: 'rgba(52, 152, 219, 0.4)' }, lineStyle: { color: '#3498db' }, itemStyle: { color: '#3498db' } }] }]
            });
            window.addEventListener('resize', function() { chartRadar.resize(); });
        }, function(err) {
            document.getElementById('error').style.display = 'block'; document.getElementById('error').innerText = '加载失败: ' + err.message;
        });
    </script>

        </div>
    </div>
</body>
</html>
