<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基础数据统计分析</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
    <script src="../static/progress.js"></script>
</head>
<body style="background: transparent; overflow-y: auto; display: block; height: auto;">
    <div class="page-container">
        <h2 class="page-title">基础数据统计分析</h2>
        <div id="loading" class="loading">
            <div class="loading-label">正在加载并进行基础数据统计分析，请稍候...</div>
            <div class="progress-text">0%/100%</div>
            <div class="progress-bar-wrap"><div class="progress-bar-inner"></div></div>
        </div>
        <div id="error" class="error-msg" style="display:none;"></div>

        <div class="grid-2" id="content" style="display:none;">
            <div class="card">
                <h3>评论字数分布</h3>
                <div id="chart-length-dist" class="chart-container"></div>
            </div>
            <div class="card">
                <h3>各星级平均评论长度</h3>
                <div id="chart-star-length" class="chart-container"></div>
            </div>
            <div class="card">
                <h3>促销标签与评论量关联分析</h3>
                <div id="chart-tags" class="chart-container"></div>
            </div>
            <div class="card">
                <h3>用户评分分布分析</h3>
                <div id="chart-star" class="chart-container"></div>
            </div>
            <div class="card" style="grid-column: span 2;">
                <h3>评论时间分布分析</h3>
                <div id="chart-time" class="chart-container"></div>
            </div>
        </div>
    </div>

    <script>
        var pg = createProgress('loading');
        pg.start();
        axios.get('/api/basic_analysis')
            .then(function(res) {
                if(res.data.error) throw new Error(res.data.error);
                var data = res.data;
                pg.finish();
                document.getElementById('content').style.display = 'grid';

                // 评论字数分布图
                var lengthData = data.comment_length;
                var chartLen = echarts.init(document.getElementById('chart-length-dist'));
                chartLen.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: Object.keys(lengthData.length_dist) },
                    yAxis: { type: 'value', name: '评论数量' },
                    series: [{ data: Object.values(lengthData.length_dist), type: 'bar', itemStyle: { color: '#3498db' } }]
                });

                // 各星级平均评论长度
                var chartStarLen = echarts.init(document.getElementById('chart-star-length'));
                chartStarLen.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: lengthData.star_avg_length.map(function(d) { return d['星级']; }) },
                    yAxis: { type: 'value', name: '平均字数' },
                    series: [{ data: lengthData.star_avg_length.map(function(d) { return d['平均字数']; }), type: 'bar', itemStyle: { color: '#e67e22' } }]
                });

                // 标签统计图
                var chartTags = echarts.init(document.getElementById('chart-tags'));
                chartTags.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'value', name: '评论量' },
                    yAxis: { type: 'category', data: Object.keys(data.tag_comments), axisLabel: { width: 100, overflow: 'break' } },
                    series: [{ data: Object.values(data.tag_comments), type: 'bar', itemStyle: { color: '#9b59b6' } }]
                });

                // 用户星级饼图
                var chartStar = echarts.init(document.getElementById('chart-star'));
                var starData = [];
                for(var k in data.star_dist) { starData.push({name: k + '星', value: data.star_dist[k]}); }
                chartStar.setOption({
                    tooltip: { trigger: 'item' },
                    legend: { bottom: '0%' },
                    series: [{ type: 'pie', radius: '60%', data: starData, emphasis:
                    { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } } }]
                });

                // 评论时间折线图
                var chartTime = echarts.init(document.getElementById('chart-time'));
                chartTime.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: Object.keys(data.time_dist) },
                    yAxis: { type: 'value', name: '评论量' },
                    series: [{ data: Object.values(data.time_dist), type: 'line', areaStyle: {}, itemStyle: { color: '#2ecc71' } }]
                });

                window.addEventListener('resize', function() {
                    chartLen.resize(); chartStarLen.resize(); chartTags.resize(); chartStar.resize(); chartTime.resize();
                });
            })
            .catch(function(err) {
                pg.finish();
                var errorEl = document.getElementById('error');
                errorEl.style.display = 'block';
                errorEl.innerText = '加载失败: ' + err.message;
            });
    </script>
</body>
</html>
