<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户群体聚类</title>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
    <script src="../static/progress.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #333; }
        .chart-container { height: 500px; width: 100%; }
        .loading { text-align: center; padding: 50px; font-size: 16px; color: #666; }
        .loading .progress-text { margin-top: 15px; font-size: 18px; font-weight: bold; color: #3498db; }
        .loading .progress-bar-wrap { width: 300px; max-width: 80%; height: 8px; background: #e0e0e0; border-radius: 4px; margin: 10px auto 0; overflow: hidden; }
        .loading .progress-bar-inner { height: 100%; background: linear-gradient(to right, #3498db, #2ecc71); border-radius: 4px; width: 0%; transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div class="card">
        <h2>美的空气炸锅用户群体特征聚类</h2>
        <div id="loading1" class="loading">
            <div class="loading-label">数据加载分析中，请稍候...</div>
            <div class="progress-text">0%/100%</div>
            <div class="progress-bar-wrap"><div class="progress-bar-inner"></div></div>
        </div>
        <div id="chart1" class="chart-container" style="display: none;"></div>
        <p style="margin-top: 15px; color: #666; font-size: 14px;">
            注：基于用户评论的情感得分、关注点（价格、容量等）和星级评价进行多维度 K-Means 聚类，提炼出不同的用户群体画像。</p>
    </div>

    <script>
        const chart1 = echarts.init(document.getElementById('chart1'));

        const pg = createProgress('loading1');
        sseRequest('/api/kmeans_midea', pg, function(data) {
            if (data.error) {
                alert(data.error);
                return;
            }
            renderChart(data);
        }, function(err) {
            document.getElementById('loading1').style.display = 'block';
            document.getElementById('loading1').querySelector('.loading-label').innerText = "请求失败，请检查后端服务是否开启。";
        });

        function renderChart(data) {
            document.getElementById('loading1').style.display = 'none';
            document.getElementById('chart1').style.display = 'block';
            chart1.resize();

            const option = {
                title: {
                    text: '用户群体分布比例',
                    left: 'center'
                },
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b} : {c}%'
                },
                legend: {
                    bottom: 10,
                    left: 'center',
                    data: data.clusters
                },
                series: [
                    {
                        name: '用户群体',
                        type: 'pie',
                        radius: '55%',
                        center: ['50%', '50%'],
                        data: data.data,
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }
                ]
            };
            chart1.setOption(option);
        }

        window.addEventListener('resize', function() {
            chart1.resize();
        });
    </script>
</body>
</html>
