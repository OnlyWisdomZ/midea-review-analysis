<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>促销标签与评论量关联分析</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
    <script src="../static/progress.js"></script>
</head>
<body style="background: transparent; overflow-y: auto; display: block; height: auto;">
    <div class="page-container">
        <h2 class="page-title">促销标签与评论量关联分析</h2>
        <div id="loading" class="loading">
            <div class="loading-label">正在加载并进行分析，请稍候...</div>
            <div class="progress-text">0%/100%</div>
            <div class="progress-bar-wrap"><div class="progress-bar-inner"></div></div>
        </div>
        <div id="error" class="error-msg" style="display:none;"></div>

        <div class="grid-2" id="content" style="display:none;">

            <div class="card" style="grid-column: span 2;">
                <h3>促销标签统计</h3>
                <div id="chart-tags" class="chart-container"></div>
            </div>

    <script>
        var pg = createProgress('loading');
        pg.start();
        axios.get('/api/basic_analysis').then(function(res) {
            if(res.data.error) throw new Error(res.data.error);
            var data = res.data;
            pg.finish();
            document.getElementById('content').style.display = 'grid';
            var chartTags = echarts.init(document.getElementById('chart-tags'));
            
            var tagArray = [];
            for (var key in data.tag_comments) {
                tagArray.push({name: key, value: data.tag_comments[key]});
            }
            // 为了在横向柱状图中使数量最多的在最上面显示，需要按值升序排列（Echarts 的 yAxis 默认从下往上绘制）
            tagArray.sort(function(a, b) { return a.value - b.value; });
            
            var categoryData = tagArray.map(function(item) { return item.name; });
            var seriesData = tagArray.map(function(item) { return item.value; });

            chartTags.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                xAxis: { type: 'value', name: '评论量' },
                yAxis: { type: 'category', data: categoryData, axisLabel: { width: 100, overflow: 'break' } },
                series: [{ data: seriesData, type: 'bar', itemStyle: { color: '#9b59b6' } }]
            });
            window.addEventListener('resize', function() { chartTags.resize(); });
        }).catch(function(err) {
            pg.finish();
            document.getElementById('error').style.display = 'block'; document.getElementById('error').innerText = '加载失败: ' + err.message;
        });
    </script>

        </div>
    </div>
</body>
</html>
