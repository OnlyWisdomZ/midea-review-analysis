<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>美的空气炸锅评论文本关键词提取与统计</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
    <script src="../static/progress.js"></script>
</head>
<body style="background: transparent; overflow-y: auto; display: block; height: auto;">
    <div class="page-container">
        <h2 class="page-title">美的空气炸锅评论文本关键词提取与统计</h2>
        <div id="loading" class="loading">
            <div class="loading-label">正在加载并进行分析，请稍候...</div>
            <div class="progress-text">0%/100%</div>
            <div class="progress-bar-wrap"><div class="progress-bar-inner"></div></div>
        </div>
        <div id="error" class="error-msg" style="display:none;"></div>

        <div class="grid-2" id="content" style="display:none;">

            <div class="card" style="grid-column: span 2;">
                <h3>TF-IDF Top 20</h3>
                <div id="chart-bar" class="chart-container"></div>
            </div>

    <script>
        var pg = createProgress('loading');
        sseRequest('/api/keywords', pg, function(data) {
            var words = data.keywords;
            document.getElementById('content').style.display = 'grid';
            var chartBar = echarts.init(document.getElementById('chart-bar'));
            var top20 = words.slice(0, 20);
            chartBar.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: top20.map(function(item) { return item.name; }), axisLabel: { interval: 0, rotate: 30 } },
                yAxis: { type: 'value', name: 'TF-IDF 权重' },
                series: [{ data: top20.map(function(item) { return item.value; }), type: 'bar', itemStyle: { color: '#2ecc71' } }]
            });
            window.addEventListener('resize', function() { chartBar.resize(); });
        }, function(err) {
            document.getElementById('error').style.display = 'block'; document.getElementById('error').innerText = '加载失败: ' + err.message;
        });
    </script>

        </div>
    </div>
</body>
</html>
